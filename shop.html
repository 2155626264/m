<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易商品购买站</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family: system-ui}
        body {background:#f5f5f5; padding:15px; max-width:700px; margin:0 auto}
        .title {text-align:center; margin:20px 0; color:#222}
        /* 商品卡片 */
        .goods-list {display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px}
        .goods-card {background:#fff; border-radius:10px; padding:12px}
        .goods-img {width:100%; height:140px; background:#eee; border-radius:6px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; color:#999}
        .goods-name {font-weight:bold; margin:6px 0}
        .price {color:#f44336; font-size:18px}
        .add-cart {width:100%; margin-top:8px; padding:8px; border:none; background:#2563eb; color:#fff; border-radius:6px; cursor:pointer}
        /* 购物车区域 */
        .cart-box {background:#fff; border-radius:10px; padding:15px; margin:20px 0}
        .cart-item {display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee}
        .total {font-size:18px; font-weight:bold; margin-top:10px; color:#f44336}
        .checkout-btn {width:100%; padding:12px; border:none; background:#16a34a; color:#fff; border-radius:8px; font-size:16px; margin-top:10px; cursor:pointer}
        /* 下单弹窗 */
        .mask {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center}
        .order-form {background:#fff; width:90%; max-width:450px; padding:20px; border-radius:12px}
        .form-item {margin:12px 0}
        label {display:block; margin-bottom:4px; font-size:14px}
        input {width:100%; padding:10px; border:1px solid #ddd; border-radius:6px}
        .btn-group {display:flex; gap:10px; margin-top:15px}
        .submit-order {flex:1; padding:10px; border:none; background:#16a34a; color:#fff; border-radius:6px}
        .close-mask {flex:1; padding:10px; border:1px solid #ddd; background:#fff; border-radius:6px}
    </style>
</head>
<body>
    <h1 class="title">好物商城</h1>

    <!-- 商品列表 -->
    <div class="goods-list">
        <div class="goods-card">
            <div class="goods-img">商品图1</div>
            <div class="goods-name">精品水杯</div>
            <div class="price">¥39.9</div>
            <button class="add-cart" onclick="addCart('精品水杯',39.9)">加入购物车</button>
        </div>
        <div class="goods-card">
            <div class="goods-img">商品图2</div>
            <div class="goods-name">帆布背包</div>
            <div class="price">¥69</div>
            <button class="add-cart" onclick="addCart('帆布背包',69)">加入购物车</button>
        </div>
        <div class="goods-card">
            <div class="goods-img">商品图3</div>
            <div class="goods-name">桌面台灯</div>
            <div class="price">¥45</div>
            <button class="add-cart" onclick="addCart('桌面台灯',45)">加入购物车</button>
        </div>
        <div class="goods-card">
            <div class="goods-img">商品图4</div>
            <div class="goods-name">简约笔记本</div>
            <div class="price">¥19.9</div>
            <button class="add-cart" onclick="addCart('简约笔记本',19.9)">加入购物车</button>
        </div>
    </div>

    <!-- 购物车 -->
    <div class="cart-box">
        <h3>我的购物车</h3>
        <div id="cartList"></div>
        <div class="total">合计：¥<span id="totalNum">0.00</span></div>
        <button class="checkout-btn" onclick="openOrder()">立即结算下单</button>
    </div>

    <!-- 下单弹窗 -->
    <div class="mask" id="mask">
        <div class="order-form">
            <h3>填写收货信息</h3>
            <div class="form-item">
                <label>姓名</label>
                <input type="text" id="name" placeholder="请输入收货人姓名">
            </div>
            <div class="form-item">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入联系电话">
            </div>
            <div class="form-item">
                <label>收货地址</label>
                <input type="text" id="addr" placeholder="省市区详细地址">
            </div>
            <div class="btn-group">
                <button class="submit-order" onclick="submitOrder()">提交订单</button>
                <button class="close-mask" onclick="closeMask()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 购物车数据
        let cart = [];
        const cartList = document.getElementById('cartList');
        const totalNum = document.getElementById('totalNum');
        const mask = document.getElementById('mask');

        // 添加商品到购物车
        function addCart(name, price) {
            let exist = cart.find(item => item.name === name);
            if(exist){
                exist.num +=1;
            }else{
                cart.push({name, price, num:1})
            }
            renderCart();
        }

        // 渲染购物车
        function renderCart(){
            cartList.innerHTML = '';
            let total = 0;
            cart.forEach(item=>{
                let itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <span>${item.name} ×${item.num}</span>
                    <span>¥${(item.price * item.num).toFixed(2)}</span>
                `;
                cartList.appendChild(itemDiv);
                total += item.price * item.num;
            })
            totalNum.innerText = total.toFixed(2);
        }

        // 打开下单弹窗
        function openOrder(){
            if(cart.length === 0){
                alert("购物车暂无商品，请先选购！");
                return;
            }
            mask.style.display = 'flex';
        }

        // 关闭弹窗
        function closeMask(){
            mask.style.display = 'none';
        }

        // 提交订单（仅弹窗展示信息）
        function submitOrder(){
            let name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();
            let addr = document.getElementById('addr').value.trim();
            if(!name || !phone || !addr){
                alert("请完整填写收货信息！");
                return;
            }
            // 拼接订单内容
            let orderText = "=== 新订单 ===\n";
            orderText += `收货人：${name}\n电话：${phone}\n地址：${addr}\n商品清单：\n`;
            let allTotal = 0;
            cart.forEach(item=>{
                orderText += `${item.name} ×${item.num} = ¥${(item.price*item.num).toFixed(2)}\n`;
                allTotal += item.price * item.num;
            })
            orderText += `订单总价：¥${allTotal.toFixed(2)}`;
            alert(orderText);
            // 清空购物车+关闭弹窗
            cart = [];
            renderCart();
            closeMask();
            // 清空输入框
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('addr').value = '';
        }
    </script>
</body>
</html>
